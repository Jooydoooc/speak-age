<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#09090b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Speak_Age" />
<meta name="format-detection" content="telephone=no" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.svg" />
<link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
<title>Reset password — Speak_Age</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="/index.html" class="auth-logo"><svg class="auth-logo-mark" viewBox="0 0 512 512" fill="none" aria-hidden="true"><g stroke="currentColor" stroke-width="38" stroke-linecap="round" fill="none"><circle cx="256" cy="248" r="84"/><ellipse cx="256" cy="256" rx="180" ry="58" transform="rotate(-18 256 256)"/><path d="M 340 140 Q 358 118 380 132"/><path d="M 374 118 Q 394 100 416 118"/></g></svg><span class="auth-logo-text">Speak<span class="underscore">_</span>Age</span></a>
    <h1>Reset your password</h1>
    <p class="sub">Enter your email — we'll send you a reset link.</p>

    <div id="msg"></div>

    <form id="forgot-form">
      <div class="form-row"><label>Email</label><input type="email" name="email" required autocomplete="email" /></div>
      <button class="btn btn-primary btn-block" type="submit">Send reset link</button>
    </form>

    <p class="auth-foot" style="margin-top:24px"><a href="/login.html">Back to sign in</a></p>
  </div>
</div>

<script src="/js/main.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>

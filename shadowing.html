<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#09090b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Speak_Age" />
<meta name="format-detection" content="telephone=no" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.svg" />
<link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
<title>Shadowing Lessons — Speak_Age</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="/index.html" class="logo"><svg class="logo-mark" viewBox="0 0 512 512" fill="none" aria-hidden="true"><g stroke="currentColor" stroke-width="42" stroke-linecap="round" fill="none"><circle cx="256" cy="248" r="84"/><ellipse cx="256" cy="256" rx="180" ry="58" transform="rotate(-18 256 256)"/><path d="M 340 140 Q 358 118 380 132"/><path d="M 374 118 Q 394 100 416 118"/></g></svg><span class="logo-text">Speak<span class="underscore">_</span>Age</span></a>
    <ul class="nav-links">
      <li><a href="/topics.html">Topics</a></li>
      <li><a href="/shadowing.html">Shadowing</a></li>
      <li><a href="/exercises.html">Exercises</a></li>
      <li><a href="/materials.html">Materials</a></li>
    </ul>
    <div class="nav-right">
      <a href="/dashboard.html" class="btn btn-ghost" id="nav-dash">Dashboard</a>
    </div>
    <button class="menu-toggle"><span></span></button>
  </div>
</header>

<div class="container">

  <!-- Top bar: search + sort -->
  <div class="shadowing-topbar">
    <div class="shadowing-search">
      <svg class="shadowing-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="search" id="search" placeholder="Search lessons..." aria-label="Search lessons" />
    </div>
    <div class="shadowing-sort">
      <label for="sort" class="shadowing-sort-label">Sort</label>
      <select id="sort" aria-label="Sort lessons">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="az">A–Z</option>
      </select>
    </div>
  </div>

  <!-- Sidebar + grid -->
  <div class="shadowing-layout">

    <!-- Level menu — vertical sidebar on desktop, horizontal pill strip on mobile -->
    <aside class="level-sidebar">
      <!-- Brand title with icon, above the levels panel -->
      <div class="shadowing-brand">
        <span class="shadowing-brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="3" y2="12"></line>
            <line x1="6" y1="9" x2="6" y2="15"></line>
            <line x1="9" y1="5" x2="9" y2="19"></line>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="15" y1="3" x2="15" y2="21"></line>
            <line x1="18" y1="7" x2="18" y2="17"></line>
            <line x1="21" y1="10" x2="21" y2="14"></line>
          </svg>
        </span>
        <span class="shadowing-brand-text">Shadowing</span>
      </div>

      <!-- Levels — separate panel -->
      <div class="level-panel">
        <div class="level-sidebar-head">Levels</div>
        <nav class="level-menu" id="filters" role="tablist" aria-label="Lesson level">
        <button class="level-item active" type="button" role="tab" data-level="all">
          <span class="level-item-name">All</span>
          <span class="level-item-count" data-count="all">0</span>
        </button>
        <button class="level-item" type="button" role="tab" data-level="Beginner">
          <span class="level-item-dot" style="background:#0f6e56"></span>
          <span class="level-item-name">Beginner</span>
          <span class="level-item-count" data-count="Beginner">0</span>
        </button>
        <button class="level-item" type="button" role="tab" data-level="Elementary">
          <span class="level-item-dot" style="background:#0a6b6b"></span>
          <span class="level-item-name">Elementary</span>
          <span class="level-item-count" data-count="Elementary">0</span>
        </button>
        <button class="level-item" type="button" role="tab" data-level="Pre-IELTS">
          <span class="level-item-dot" style="background:#1a4fa0"></span>
          <span class="level-item-name">Pre-IELTS</span>
          <span class="level-item-count" data-count="Pre-IELTS">0</span>
        </button>
        <button class="level-item" type="button" role="tab" data-level="Introduction">
          <span class="level-item-dot" style="background:#3c3489"></span>
          <span class="level-item-name">Introduction</span>
          <span class="level-item-count" data-count="Introduction">0</span>
        </button>
        <button class="level-item" type="button" role="tab" data-level="Graduation">
          <span class="level-item-dot" style="background:#633806"></span>
          <span class="level-item-name">Graduation</span>
          <span class="level-item-count" data-count="Graduation">0</span>
        </button>
        </nav>
      </div>
    </aside>

    <!-- Cards area -->
    <div class="shadowing-main">
      <div class="cards-grid" id="lessons"></div>
    </div>

  </div>
</div>

<footer>
  <div class="container footer-inner">
    <a href="/index.html" class="logo"><svg class="logo-mark" viewBox="0 0 512 512" fill="none" aria-hidden="true"><g stroke="currentColor" stroke-width="42" stroke-linecap="round" fill="none"><circle cx="256" cy="248" r="84"/><ellipse cx="256" cy="256" rx="180" ry="58" transform="rotate(-18 256 256)"/><path d="M 340 140 Q 358 118 380 132"/><path d="M 374 118 Q 394 100 416 118"/></g></svg><span class="logo-text">Speak<span class="underscore">_</span>Age</span></a>
    <ul class="footer-links"><li><a href="#">Privacy</a></li><li><a href="#">Terms</a></li><li><a href="#">Contact</a></li></ul>
  </div>
</footer>

<script src="/js/main.js"></script>
<script src="/js/shadowing.js"></script>
</body>
</html>

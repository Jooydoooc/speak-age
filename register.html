<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#09090b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Speak_Age" />
<meta name="format-detection" content="telephone=no" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.svg" />
<link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
<title>Create account — Speak_Age</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="/index.html" class="auth-logo"><svg class="auth-logo-mark" viewBox="0 0 512 512" fill="none" aria-hidden="true"><g stroke="currentColor" stroke-width="38" stroke-linecap="round" fill="none"><circle cx="256" cy="248" r="84"/><ellipse cx="256" cy="256" rx="180" ry="58" transform="rotate(-18 256 256)"/><path d="M 340 140 Q 358 118 380 132"/><path d="M 374 118 Q 394 100 416 118"/></g></svg><span class="auth-logo-text">Speak<span class="underscore">_</span>Age</span></a>
    <h1>Create your account</h1>
    <p class="sub">Free for students. Start practicing in seconds.</p>

    <div id="msg"></div>

    <div class="social-btns">
      <a class="social-btn" data-provider="google" href="/api/auth/google">
        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0012 23z"/><path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18A11 11 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.83z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.83C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
        Sign up with Google
      </a>
      <a class="social-btn social-btn-apple" data-provider="apple" href="/api/auth/apple">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#fafafa"><path d="M17.53 12.39c-.02-2.45 2-3.62 2.09-3.68-1.14-1.67-2.91-1.9-3.54-1.93-1.51-.15-2.94.88-3.71.88-.77 0-1.95-.86-3.2-.84-1.65.02-3.17.96-4.02 2.44-1.71 2.97-.44 7.36 1.22 9.77.81 1.18 1.78 2.5 3.05 2.45 1.22-.05 1.69-.79 3.17-.79 1.48 0 1.9.79 3.2.77 1.32-.02 2.16-1.2 2.97-2.38.93-1.36 1.32-2.68 1.34-2.75-.03-.01-2.58-.99-2.6-3.94zM15.3 5.18c.67-.83 1.13-1.97 1-3.12-.97.04-2.16.65-2.86 1.46-.62.72-1.18 1.89-1.03 3.01 1.08.08 2.2-.55 2.89-1.35z"/></svg>
        Sign up with Apple
      </a>
      <a class="social-btn" data-provider="github" href="/api/auth/github">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#fafafa"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.4-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 016 0C17.3 4.7 18.3 5 18.3 5c.7 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.2.9 2.4v3.6c0 .3.2.7.8.6A12 12 0 0012 .3"/></svg>
        Sign up with GitHub
      </a>
    </div>

    <div class="divider">or with email</div>

    <form id="register-form">
      <div class="form-row"><label>Name</label><input type="text" name="name" required autocomplete="name" /></div>
      <div class="form-row"><label>Email</label><input type="email" name="email" required autocomplete="email" /></div>
      <div class="form-row"><label>Password (8+ characters)</label><input type="password" name="password" minlength="8" required autocomplete="new-password" /></div>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>

    <p class="auth-foot">Already have an account? <a href="/login.html">Sign in</a></p>
  </div>
</div>

<script src="/js/main.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>

  <div class="container">
    <h1>Study Materials</h1>
    <p>Vocabulary, idioms, band descriptors and grammar — all in one place.</p>
  </div>
</section>

<div class="container">
  <div class="filters" id="filters">
    <button class="pill active" data-cat="all">All</button>
    <button class="pill" data-cat="Vocabulary">Vocabulary</button>
    <button class="pill" data-cat="Idioms">Idioms</button>
    <button class="pill" data-cat="Band descriptors">Band descriptors</button>
    <button class="pill" data-cat="Sample answers">Sample answers</button>
    <button class="pill" data-cat="Grammar for speaking">Grammar for speaking</button>
  </div>

</div>

  </div>

<script src="/js/main.js"></script>
<script>
(async function () {
  const user = await window.requireAuth();
  if (!user) return;

  const grid = document.getElementById('materials');
  const filters = document.getElementById('filters');
  let materials = [];
  let activeCat = 'all';

  async function load() {
    const { ok, data } = await window.api('/api/materials');
    materials = ok ? (data.materials || []) : [];
    render();
  }

  function esc(str) {
    return String(str || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function render() {
    const list = activeCat === 'all' ? materials : materials.filter(m => m.category === activeCat);
    if (list.length === 0) {
      grid.innerHTML = `<div style="padding:48px;color:var(--muted);text-align:center;grid-column:1/-1">No materials available.</div>`;
      return;
    }
    grid.innerHTML = list.map(m => `
      <div class="material-card">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div class="file-icon">PDF</div>
          <div style="flex:1">
            <div class="card-title">${esc(m.title)}</div>
            <div class="card-meta">${esc(m.file_size || '')}</div>
          </div>
        </div>
        <span class="badge">${esc(m.category)}</span>
        <a class="btn btn-primary btn-sm" href="${esc(m.file_url)}" target="_blank" rel="noopener">Download</a>
      </div>
    `).join('');
  }

  filters.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    filters.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.getAttribute('data-cat');
    render();
  });

  load();
})();
</script>
</body>
</html>
